{% extends "base.html" %}
{% block title %}{{ t("recharge.enterNumber.title") }}{% endblock %}

{% block extra_js %}
<script defer src="{{ url_for('static', filename='js/country_picker.js') }}"></script>
<script defer src="{{ url_for('static', filename='js/enter_number.js') }}"></script>
{% endblock %}

{% block content %}
<div class="tz-page">
  <div class="tz-bg">
  <img
    src="{{ url_for('static', filename='images/bg.jpeg') }}"
    alt=""
  >
</div>

  <h1 class="tz-title">
    {{ t("recharge.enterNumber.title") }}
  </h1>

  <form
    method="post"
    action="{{ url_for('recharge.enter_number_post') }}"
    class="tz-stack"
    id="enterNumberForm"
  >
    <input
      type="hidden"
      name="country_iso"
      id="countryIso"
      value="{{ country_iso|default('fr') }}"
    >

    <input
      type="hidden"
      name="country_code"
      id="countryCode"
      value="{{ country_dial|default('+33') }}"
    >

    <input
      type="hidden"
      name="phone_e164"
      id="phoneE164"
      value=""
    >

    <section class="tz-card tz-card--soft">

      <div class="tz-card__title">
        {{ t("recharge.enterNumber.beneficiaryNumber") }}
      </div>

      <div class="tz-row tz-row--gap">

        <button
          type="button"
          class="tz-flag-btn"
          id="countryBtn"
          onclick="tzOpenCountryModal()"
          data-country-iso="{{ country_iso|default('fr') }}"
          aria-label="{{ t('recharge.enterNumber.selectCountry') }}"
        >
          <span id="countryFlag" class="tz-flag">
            {{ country_flag|default('🇫🇷') }}
          </span>
        </button>

        <div class="tz-grow">
          <input
            class="tz-input {% if phone_error %}tz-input--error{% endif %}"
            id="phoneInput"
            name="phone"
            inputmode="tel"
            autocomplete="tel"
            value="{{ initial_phone|default('') }}"
            placeholder="{{ t('recharge.enterNumber.phoneExample') }}"
            required
          >
        </div>

        <button
          type="button"
          class="tz-icon-btn"
          id="contactBtn"
          data-unavailable-message="{{ t('recharge.enterNumber.contacts') }}"
          aria-label="{{ t('recharge.enterNumber.contacts') }}"
        >
          👤
        </button>

      </div>

      <div class="tz-help">
        <span
          id="phoneHelp"
          class="tz-help--muted"
          data-empty="{{ t('recharge.enterNumber.enterNumber') }}"
          data-valid="{{ t('recharge.enterNumber.validNumber') }}"
          data-invalid="{{ t('recharge.enterNumber.invalidNumber') }}"
        >
          {{ t("recharge.enterNumber.enterNumber") }}
        </span>
      </div>

    </section>

    </section>

    <button
      type="submit"
      class="tz-primary-btn"
      id="continueBtn"
      disabled
      aria-disabled="true"
    >
      {{ t("common.continue") }}
    </button>

  </form>

  <div
    class="tz-modal"
    id="countryModal"
    style="display:none;"
    aria-hidden="true"
  >

    <div
      class="tz-modal__backdrop"
      onclick="tzCloseCountryModal()"
    ></div>

    <div class="tz-modal__panel">

      <div class="tz-modal__header">

        <input
          class="tz-input"
          id="countrySearch"
          placeholder="{{ t('recharge.enterNumber.searchCountry') }}"
        >

        <button
          type="button"
          class="tz-icon-btn"
          onclick="tzCloseCountryModal()"
          aria-label="{{ t('common.close') }}"
        >
          ✕
        </button>

      </div>

      <div
        class="tz-modal__list"
        id="countryList"
      ></div>

    </div>

  </div>

</div>
{% endblock %}
