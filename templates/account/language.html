{% extends "base.html" %}

{# ---------------------------
# Language page — FINAL
# --------------------------- #}

{% block title %}{{ t("common.language") }} — Tikzok{% endblock %}

{% block content %}

<div class="tz-stack">

  <!-- Header -->
  <div class="tz-history-header">

    <button 
      onclick="window.history.back()" 
      class="tz-close-btn"
      aria-label="{{ t('common.back') }}"
    >
      ✕
    </button>

    <h2 class="tz-page-title">
      {{ t("common.language") }}
    </h2>

  </div>

  <!-- Language card -->
  <section class="tz-card">

    <div class="tz-stack">

      <a
        class="tz-lang-btn {% if current_lang == 'en' %}is-active{% endif %}"
        href="{{ url_for('i18n.change_lang', lang='en', next=next_url or '/') }}"
        role="button"
      >
        🇬🇧 {{ t("lang.en") }}
      </a>

      <a
        class="tz-lang-btn {% if current_lang == 'fr' %}is-active{% endif %}"
        href="{{ url_for('i18n.change_lang', lang='fr', next=next_url or '/') }}"
        role="button"
      >
        🇫🇷 {{ t("lang.fr") }}
      </a>

    </div>

  </section>

</div>

{% endblock %}
