{% extends "base.html" %}
{% block title %}{{ t("auth.login") }}{% endblock %}

{% block content %}
<div class="tz-auth-flutter">

  <!-- AppBar améliorée -->
  <div class="tz-auth-appbar">

    <button 
      onclick="window.history.back()" 
      class="tz-auth-close"
      aria-label="Back"
    >
      ✕
    </button>

    <div class="tz-auth-appbar-title">
      {{ t("auth.login") }}
    </div>

  </div>

  <div class="tz-auth-body">

    <form method="post"
          action="{{ url_for('auth.login') }}"
          data-tz-form>

<!-- NAME LABEL -->
<label class="tz-auth-label">
  {{ t("auth.name") }}
</label>

<div class="tz-auth-input-wrapper">
  <span class="tz-auth-icon">👤</span>

  <input
    type="text"
    name="name"
    class="tz-auth-input"
    placeholder="{{ t('auth.name_placeholder') }}"
    autocomplete="name"
    required
  />
</div>

      <!-- EMAIL LABEL -->
      <label class="tz-auth-label">
        {{ t("auth.email_label") }}
      </label>

<!-- Gmail suggestion button -->
<button type="button"
        class="tz-gmail-suggest-btn"
        id="gmailSuggestBtn"
        style="display:none;">
</button>

<div class="tz-auth-input-wrapper">

  <span class="tz-auth-icon">✉</span>

  <input
    type="text"
    name="email"
    id="emailInput"
    class="tz-auth-input"
    placeholder="{{ t('auth.email_placeholder') }}"
    autocomplete="off"
    autocapitalize="off"
    spellcheck="false"
    required
  />

</div>

      {% if error %}
        <div class="tz-auth-error">
          {{ t("auth.email_invalid") }}
        </div>
      {% endif %}

      <!-- CONTINUE BUTTON (2ème position) -->
      <button type="submit"
              class="tz-auth-btn">
        <span class="tz-auth-btn-text">
          {{ t("common.continue") }}
        </span>
        <span class="tz-auth-loader"></span>
      </button>

      <!-- SOCIAL BUTTONS (3ème position) -->
      <div class="tz-auth-social">

        <!-- Facebook -->
        <a href="#"
           class="tz-auth-circle"
           aria-label="Facebook">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="#1877F2" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 12a12 12 0 1 0-13.875 11.85v-8.385H7.078V12h3.047V9.356
            c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235
            2.686.235v2.953h-1.513c-1.491 0-1.956.925-1.956
            1.874V12h3.328l-.532 3.465h-2.796v8.385A12.001
            12.001 0 0 0 24 12z"/>
          </svg>
        </a>

        <!-- Téléphone -->
        <a href="{{ url_for('auth.phone') }}"
           class="tz-auth-circle"
           aria-label="Phone">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="#000" xmlns="http://www.w3.org/2000/svg">
            <path d="M6.62 10.79a15.054 15.054 0 006.59 6.59l2.2-2.2
            a1 1 0 011-.24c1.12.37 2.33.57 3.59.57a1
            1 0 011 1V20a1 1 0 01-1 1C10.07 21
            3 13.93 3 5a1 1 0 011-1h3.5a1
            1 0 011 1c0 1.26.2 2.47.57 3.59a1
            1 0 01-.24 1l-2.21 2.2z"/>
          </svg>
        </a>

        <!-- Google -->
        <a href="#"
           class="tz-auth-circle"
           aria-label="Google">
          <svg width="22" height="22" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <path fill="#EA4335" d="M24 9.5c3.1 0 5.9 1.1 8.1 3.3l6-6C34.4 2.6 29.6 0 24 0 14.6 0 6.6 5.8 3 14l7.4 5.8C12.2 13.4 17.6 9.5 24 9.5z"/>
            <path fill="#34A853" d="M46.1 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.5c-.5 2.7-2 5-4.2 6.6l6.5 5C43.7 35.8 46.1 30.7 46.1 24.5z"/>
            <path fill="#4A90E2" d="M10.4 28.2c-.5-1.4-.8-2.9-.8-4.2s.3-2.8.8-4.2L3 14C1.1 17.7 0 20.8 0 24s1.1 6.3 3 10l7.4-5.8z"/>
            <path fill="#FBBC05" d="M24 48c6.5 0 11.9-2.1 15.9-5.8l-6.5-5c-2 1.4-4.6 2.3-9.4 2.3-6.4 0-11.8-4-13.6-9.5L3 34c3.6 8.2 11.6 14 21 14z"/>
          </svg>
        </a>

      </div>

    </form>

  </div>

</div>
{% endblock %}
