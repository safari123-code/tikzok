{% extends "base.html" %}
{% block title %}{{ t("auth.phone") }}{% endblock %}

{% block extra_js %}
<script defer src="{{ url_for('static', filename='js/country_picker.js') }}"></script>
<script defer src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}

{% block content %}
<div class="tz-auth-flutter">

  <!-- AppBar identique login -->
<div class="tz-auth-appbar">

    <button 
      onclick="window.history.back()" 
      class="tz-auth-close"
      aria-label="Back"
    >
      ✕
    </button>

  <div class="tz-auth-appbar-title">
    {{ t("auth.phone") }}
  </div>

</div>

  <div class="tz-auth-body">

    <form method="post"
          action="{{ url_for('auth.phone') }}"
          data-tz-form>


<!-- NAME LABEL -->
<label class="tz-auth-label">
  {{ t("auth.name") }}
</label>

<div class="tz-auth-input-wrapper">
  <span class="tz-auth-icon">👤</span>

  <input
    type="text"
    name="name"
    class="tz-auth-input"
    placeholder="{{ t('auth.name_placeholder') }}"
    required
  />
</div>

      <!-- PHONE LABEL -->
      <label class="tz-auth-label">
        {{ t("auth.phone_label") }}
      </label>

      <!-- Hidden country code -->
      <input type="hidden" name="country_code" id="countryCode" value="+33">

      <!-- Input wrapper EXACTEMENT comme login -->
      <div class="tz-auth-input-wrapper">

        <!-- Flag -->
        <button type="button"
                class="tz-flag-btn"
                onclick="tzOpenCountryModal()">
          <span id="countryFlag" class="tz-flag">🇫🇷</span>
        </button>

        <!-- Phone icon -->
        <span class="tz-auth-icon">📱</span>

        <!-- Phone input -->
        <input
          type="tel"
          name="phone"
          id="phoneInput"
          class="tz-auth-input"
          autocomplete="tel"
          inputmode="tel"
          placeholder="{{ t('auth.phone_placeholder') }}"
          required
        />
      </div>

      {% if error %}
        <div class="tz-auth-error">
          {{ t("auth.invalid_phone") }}
        </div>
      {% endif %}

      <!-- CONTINUE BUTTON -->
      <button type="submit"
              class="tz-auth-btn">
        <span class="tz-auth-btn-text">
          {{ t("common.continue") }}
        </span>
        <span class="tz-auth-loader"></span>
      </button>

      <!-- SOCIAL BUTTONS (même design que login) -->
      <div class="tz-auth-social">

        <!-- Facebook -->
        <a href="#" class="tz-auth-circle" aria-label="Facebook">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="#1877F2">
            <path d="M24 12a12 12 0 1 0-13.875 11.85v-8.385H7.078V12h3.047V9.356
            c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235
            2.686.235v2.953h-1.513c-1.491 0-1.956.925-1.956
            1.874V12h3.328l-.532 3.465h-2.796v8.385A12.001
            12.001 0 0 0 24 12z"/>
          </svg>
        </a>

<a href="{{ url_for('auth.login') }}"
   class="tz-auth-circle"
   aria-label="Gmail">
  <svg width="20" height="20" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
    <path fill="#EA4335" d="M24 9.5l11.5-8.5H12.5z"/>
    <path fill="#4285F4" d="M4 9.5V38a4 4 0 004 4h8V23z"/>
    <path fill="#34A853" d="M44 9.5V38a4 4 0 01-4 4h-8V23z"/>
    <path fill="#FBBC05" d="M24 23L4 9.5 12.5 4 24 13.5 35.5 4 44 9.5z"/>
  </svg>
</a>
        <!-- Google -->
        <a href="#" class="tz-auth-circle" aria-label="Google">
          <svg width="22" height="22" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <path fill="#EA4335" d="M24 9.5c3.1 0 5.9 1.1 8.1 3.3l6-6C34.4 2.6 29.6 0 24 0 14.6 0 6.6 5.8 3 14l7.4 5.8C12.2 13.4 17.6 9.5 24 9.5z"/>
            <path fill="#34A853" d="M46.1 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.5c-.5 2.7-2 5-4.2 6.6l6.5 5C43.7 35.8 46.1 30.7 46.1 24.5z"/>
            <path fill="#4A90E2" d="M10.4 28.2c-.5-1.4-.8-2.9-.8-4.2s.3-2.8.8-4.2L3 14C1.1 17.7 0 20.8 0 24s1.1 6.3 3 10l7.4-5.8z"/>
            <path fill="#FBBC05" d="M24 48c6.5 0 11.9-2.1 15.9-5.8l-6.5-5c-2 1.4-4.6 2.3-9.4 2.3-6.4 0-11.8-4-13.6-9.5L3 34c3.6 8.2 11.6 14 21 14z"/>
          </svg>
        </a>

      </div>

    </form>

  </div>
</div>

<!-- Country Modal -->
<div class="tz-modal" id="countryModal">
  <div class="tz-modal__backdrop" onclick="tzCloseCountryModal()"></div>
  <div class="tz-modal__panel">
    <div class="tz-modal__header">
      <input class="tz-input"
             id="countrySearch"
             placeholder="{{ t('recharge.enterNumber.searchCountry') }}"
             oninput="tzFilterCountries()">
      <button type="button"
              class="tz-icon-btn"
              onclick="tzCloseCountryModal()">✕</button>
    </div>
    <div class="tz-modal__list" id="countryList"></div>
  </div>
</div>

{% endblock %}
