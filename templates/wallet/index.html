{% extends "base.html" %}

{% block content %}
<div class="tz-page">

<h1 class="tz-title">Wallet</h1>

<!-- Balance -->
<section class="tz-card tz-card--highlight">

<div class="tz-amount">
{{ "%.2f"|format(balance) }} €
</div>

<div class="tz-muted">
{{ t("wallet.balance") }}
</div>

</section>


<!-- Quick amounts -->
<section class="tz-card">

<div class="tz-card__title">
{{ t("wallet.addCredit") }}
</div>

<div class="tz-wrap" id="quickAmounts">

<button type="button" class="tz-amt-btn is-selected" data-amount="5">5 €</button>
<button type="button" class="tz-amt-btn" data-amount="10">10 €</button>
<button type="button" class="tz-amt-btn" data-amount="40">40 €</button>
<button type="button" class="tz-amt-btn" data-amount="60">60 €</button>
<button type="button" class="tz-amt-btn" data-amount="80">80 €</button>
<button type="button" class="tz-amt-btn" data-amount="100">100 €</button>

</div>

<!-- share button -->
<button
type="button"
id="shareLinkBtn"
class="tz-share-btn">
🔗 {{ t("wallet.shareAfterPayment") }}
</button>

</section>


<!-- Pay -->
<a href="#"
id="quickPayBtn"
class="tz-primary-btn">
{{ t("payment.pay") }} 5 €
</a>

</div>


<script>
// ---------------------------
// Wallet quick amounts FINAL
// ---------------------------
(function(){

const buttons = document.querySelectorAll("#quickAmounts .tz-amt-btn");
const payBtn = document.getElementById("quickPayBtn");
const shareBtn = document.getElementById("shareLinkBtn");

if(!buttons.length || !payBtn) return;

let selectedAmount = 5;

// click amount
buttons.forEach(btn => {

btn.addEventListener("click", () => {

buttons.forEach(b => b.classList.remove("is-selected"));
btn.classList.add("is-selected");

selectedAmount = parseFloat(btn.dataset.amount);

payBtn.textContent =
`{{ t("payment.pay") }} ${selectedAmount.toFixed(2)} €`;

});

});

// continue -> payment method
payBtn.addEventListener("click", (e) => {

e.preventDefault();

window.location.href =
`/payment/method?amount=${selectedAmount}`;

});

// share link
shareBtn?.addEventListener("click", async () => {

const link =
`${window.location.origin}/payment/card?amount=${selectedAmount}`;

try {
await navigator.clipboard.writeText(link);

shareBtn.textContent = "✓";

setTimeout(()=>{
shareBtn.textContent = "🔗 {{ t('wallet.shareAfterPayment') }}";
},1500);

} catch(e){}

});

})();
</script>

{% endblock %}
